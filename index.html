<style>
/* ============================================================
   FOREVER SMILES IMPLANT CENTER — Design System
   ============================================================ */
:root {
  /* Color */
  --ink: oklch(0.18 0.04 255);          /* deep navy near-black */
  --navy: oklch(0.26 0.06 255);         /* primary navy */
  --navy-2: oklch(0.34 0.06 255);       /* mid navy */
  --navy-soft: oklch(0.42 0.05 250);
  --porcelain: oklch(0.985 0.004 80);   /* warm white */
  --bone: oklch(0.96 0.006 75);         /* warm off-white */
  --paper: oklch(0.93 0.008 75);
  --grey: oklch(0.58 0.01 250);
  --grey-2: oklch(0.74 0.008 250);
  --line: oklch(0.88 0.008 250);
  --line-dark: oklch(0.34 0.04 255);
  --accent: oklch(0.68 0.13 240);       /* interactive blue */
  --accent-soft: oklch(0.88 0.05 240);
  --warning: oklch(0.78 0.12 70);

  /* Type */
  --display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
  --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Motion */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --t-fast: 220ms;
  --t-base: 480ms;
  --t-slow: 900ms;

  /* Layout */
  --pad-x: clamp(20px, 4vw, 64px);
  --max: 1440px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--porcelain); color: var(--ink); }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  font-feature-settings: "ss01", "cv01";
  overflow-x: hidden;
}
img, video, svg { display: block; max-width: 100%; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }

::selection { background: var(--ink); color: var(--porcelain); }

/* Type scale */
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey);
  font-weight: 600;
  margin-bottom: 20px;
}
.eyebrow .dot, .dot {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); margin-right: 16px;
  transform: translateY(-2px);
}
.h-display {
  font-family: var(--display);
  font-weight: 400;
  letter-spacing: -0.035em;
  line-height: 0.96;
  font-size: clamp(48px, 8.5vw, 148px);
}
.h1 {
  font-family: var(--display);
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1.0;
  font-size: clamp(40px, 6vw, 96px);
}
.h2 {
  font-family: var(--display);
  font-weight: 400;
  letter-spacing: -0.025em;
  line-height: 1.05;
  font-size: clamp(32px, 4.4vw, 68px);
}
.h3 {
  font-family: var(--display);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-size: clamp(24px, 2.4vw, 36px);
}
.lede {
  font-size: clamp(18px, 1.4vw, 22px);
  line-height: 1.45;
  color: var(--navy-soft);
  letter-spacing: -0.005em;
}
.body {
  font-size: 16px;
  line-height: 1.6;
  color: var(--navy-soft);
}

/* Buttons */
.btn {
  --bg: var(--ink);
  --fg: var(--porcelain);
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 22px;
  background: var(--bg);
  color: var(--fg);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  position: relative;
  overflow: hidden;
  transition: transform var(--t-fast) var(--ease-out);
  isolation: isolate;
}
.btn::before {
  content: "";
  position: absolute; inset: 0;
  background: var(--accent);
  border-radius: inherit;
  transform: translateY(101%);
  transition: transform var(--t-base) var(--ease-out);
  z-index: -1;
}
.btn:hover::before { transform: translateY(0); }
.btn:hover { color: var(--ink); }
.btn:hover .btn-arrow { transform: translateX(4px) rotate(-45deg); }
.btn .btn-arrow {
  display: inline-block;
  transition: transform var(--t-base) var(--ease-out);
}
.btn--ghost {
  --bg: transparent;
  --fg: var(--ink);
  border: 1px solid color-mix(in oklch, var(--ink) 18%, transparent);
}
.btn--ghost:hover { color: var(--porcelain); }
.btn--ghost::before { background: var(--ink); }
.btn--light {
  --bg: var(--porcelain);
  --fg: var(--ink);
}
.btn--light::before { background: var(--accent); }

/* Sections */
section { position: relative; }
.container { max-width: var(--max); margin: 0 auto; padding-inline: var(--pad-x); }

/* Section label sticky bar (left rail) */
.rail-label {
  position: absolute; top: 0; left: var(--pad-x);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey);
  pointer-events: none;
}

/* Reveal animation */
[data-reveal] {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
  transition-delay: var(--reveal-delay, 0ms);
}
[data-reveal].is-in {
  opacity: 1; transform: translateY(0);
}
[data-reveal="scale"] {
  transform: scale(1.06);
}
[data-reveal="scale"].is-in { transform: scale(1); }
[data-reveal="line"] {
  transform: scaleX(0);
  transform-origin: left center;
  opacity: 1;
  transition: transform 1.2s var(--ease-out);
}
[data-reveal="line"].is-in { transform: scaleX(1); }

/* Split-line headline reveal */
.split-line { display: inline-block; overflow: hidden; vertical-align: bottom; padding-bottom: 0.18em; margin-bottom: -0.18em; padding-right: 0.08em; }
.split-line > span {
  display: inline-block;
  transform: translateY(110%);
  transition: transform 1s var(--ease-out);
  transition-delay: var(--split-delay, 0ms);
  will-change: transform;
}
.is-in .split-line > span,
.split-ready .split-line > span { transform: translateY(0); }

/* Placeholder media (striped) */
.media {
  position: relative;
  overflow: hidden;
  background:
    repeating-linear-gradient(135deg,
      color-mix(in oklch, var(--navy) 92%, transparent),
      color-mix(in oklch, var(--navy) 92%, transparent) 14px,
      color-mix(in oklch, var(--navy-2) 95%, transparent) 14px,
      color-mix(in oklch, var(--navy-2) 95%, transparent) 28px);
  color: var(--porcelain);
  border-radius: 4px;
}
.media--bone {
  background:
    repeating-linear-gradient(135deg,
      var(--bone), var(--bone) 14px,
      var(--paper) 14px, var(--paper) 28px);
  color: var(--navy);
}
.media .placeholder-tag {
  position: absolute;
  bottom: 14px; left: 14px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: color-mix(in oklch, var(--ink) 78%, transparent);
  color: var(--porcelain);
  padding: 6px 10px;
  border-radius: 2px;
  backdrop-filter: blur(4px);
}
.media--bone .placeholder-tag {
  background: color-mix(in oklch, var(--navy) 86%, transparent);
}
.media .play-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 88px; height: 88px;
  border-radius: 50%;
  background: var(--porcelain);
  color: var(--ink);
  display: grid; place-items: center;
  transition: transform var(--t-base) var(--ease-out), background var(--t-base) var(--ease-out);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.media .play-btn:hover {
  transform: translate(-50%, -50%) scale(1.06);
  background: var(--accent);
}
.media .play-btn::before {
  content: "▶";
  font-size: 16px;
  position: absolute;
  inset: 0;
  display: grid; place-items: center;
  transition: opacity var(--t-fast) var(--ease-out);
}

/* Grain overlay */
.grain {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.05;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
}

/* Magnetic cursor */
.cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  transform: translate(-50%, -50%);
  transition: width var(--t-fast) var(--ease-out), height var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
  mix-blend-mode: difference;
}
.cursor.is-hover {
  width: 56px; height: 56px;
  background: var(--porcelain);
}
@media (hover: none) { .cursor { display: none; } }

/* Section spacing */
.sec { padding-block: clamp(80px, 9vw, 160px); }
.sec--tight { padding-block: clamp(56px, 6vw, 96px); }

/* Dark section */
.dark {
  background: var(--ink);
  color: var(--porcelain);
}
.dark .body, .dark .lede { color: color-mix(in oklch, var(--porcelain) 75%, transparent); }
.dark .eyebrow { color: color-mix(in oklch, var(--porcelain) 60%, transparent); }
.dark .btn { --bg: var(--porcelain); --fg: var(--ink); }
.dark .btn--ghost { --bg: transparent; --fg: var(--porcelain); border-color: color-mix(in oklch, var(--porcelain) 22%, transparent); }
.dark .btn--ghost:hover { color: var(--ink); }
.dark .btn--ghost::before { background: var(--porcelain); }

/* Hairlines */
.hairline { height: 1px; background: var(--line); width: 100%; }
.dark .hairline { background: color-mix(in oklch, var(--porcelain) 16%, transparent); }

/* Form controls */
input, select, textarea {
  font: inherit;
  color: inherit;
}

/* Hide scrollbar for marquee containers */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { scrollbar-width: none; }

</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {

    <div className="twk-row twk-row-h">

/** Reveal hook: observes the element and adds .is-in once visible */
function useReveal(once = true) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("is-in");
          if (once) io.unobserve(e.target);
        } else if (!once) {
          e.target.classList.remove("is-in");
        }
      });
    }, { threshold: 0.18, rootMargin: "0px 0px -8% 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, [once]);
  return ref;
}

/** Animated number counter */
function Counter({ to, duration = 1800, prefix = "", suffix = "", decimals = 0 }) {
  const [v, setV] = React.useState(0);
  const ref = React.useRef(null);
  const started = React.useRef(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started.current) {
          started.current = true;
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setV(eased * to);
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  const formatted = decimals > 0
    ? v.toFixed(decimals)
    : Math.round(v).toLocaleString("en-US");
  return <span ref={ref}>{prefix}{formatted}{suffix}</span>;
}

/** Split-text headline. Each word gets its own .split-line wrapper */
function SplitText({ children, className = "", as: As = "span", delayBase = 60, startDelay = 0, ...rest }) {
  const ref = useReveal();
  const words = React.Children.toArray(children).flatMap((child) => {
    if (typeof child === "string") return child.split(/(\s+)/);
    return [child];
  });
  return (
    <As ref={ref} className={className} {...rest}>
      {words.map((w, i) => {
        if (typeof w !== "string") return <React.Fragment key={i}>{w}</React.Fragment>;
        if (/^\s+$/.test(w)) return <React.Fragment key={i}>{w}</React.Fragment>;
        return (
          <span key={i} className="split-line">
            <span style={{ "--split-delay": `${startDelay + i * delayBase}ms` }}>{w}</span>
          </span>
        );
      })}
    </As>
  );
}

/** Reveal wrapper */
function Reveal({ children, as: As = "div", delay = 0, kind, className = "", ...rest }) {
  const ref = useReveal();
  return (
    <As
      ref={ref}
      data-reveal={kind ?? true}
      style={{ "--reveal-delay": `${delay}ms`, ...(rest.style || {}) }}
      className={className}
      {...rest}
    >
      {children}
    </As>
  );
}

/** Striped media placeholder with caption */
function MediaPlaceholder({ tag, ratio = "16 / 9", variant = "navy", play = false, children, style = {}, className = "" }) {
  return (
    <div
      className={`media ${variant === "bone" ? "media--bone" : ""} ${className}`}

      <span className="grain"></span>
      {tag && <span className="placeholder-tag">{tag}</span>}
      {children}
    </div>
  );
}

/** Magnetic / cursor-aware button (tilts toward cursor) */
function MagneticButton({ children, className = "btn", strength = 0.3, ...rest }) {
  const ref = React.useRef(null);
  const onMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left - r.width / 2) * strength;
    const y = (e.clientY - r.top - r.height / 2) * strength;
    el.style.transform = `translate(${x}px, ${y}px)`;
  };
  const onLeave = () => {
    const el = ref.current; if (!el) return;
    el.style.transform = "translate(0,0)";
  };
  return (
    <button
      ref={ref}
      className={className}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      data-cursor="hover"
      {...rest}
    >
      {children}
    </button>
  );
}

/* ---------- App root ---------- */
function Cursor() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    let raf, x = window.innerWidth / 2, y = window.innerHeight / 2, tx = x, ty = y;
    const onMove = (e) => { tx = e.clientX; ty = e.clientY; };
    const onOver = (e) => {
      const t = e.target.closest("[data-cursor='hover'], button, a");
      if (t) el.classList.add("is-hover");
      else el.classList.remove("is-hover");
    };
    const tick = () => {
      x += (tx - x) * 0.22;
      y += (ty - y) * 0.22;
      el.style.left = x + "px";
      el.style.top = y + "px";
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseover", onOver);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseover", onOver);
    };
  }, []);
  return <div className="cursor" ref={ref} aria-hidden></div>;
}
